<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance_Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .excel-table td, .excel-table th { border: 2px solid #000; padding: 12px; text-align: center; }
        .excel-table th { background-color: #f8fafc; font-weight: 700; color: #000; }
        
        .running-block { 
            background-color: #000 !important; 
            color: #fff !important; 
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .a4-container {
            width: 210mm;
            height: 297mm;
            padding: 15mm;
            margin: auto;
            background: white;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .viz-container {
            border: 2px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-grow: 1;
            margin-top: 30px;
            margin-bottom: 10px;
            background-color: #fff;
        }

        #finalImagePreview { 
            max-height: 100%; 
            max-width: 100%; 
            object-fit: contain; 
        }

        .system-footer {
            font-size: 11px;
            color: #000;
            text-align: right;
            padding-top: 5px;
            font-style: italic;
            border-top: 1px solid #eee;
        }

        @media print {
            @page { size: A4; margin: 0; }
            body { background: none; padding: 0; }
            .no-print { display: none !important; }
            .a4-container { 
                width: 210mm; 
                height: 297mm; 
                padding: 12mm; 
                box-shadow: none;
            }
        }
    </style>
</head>
<body class="p-0 md:p-6">
    <div class="max-w-[1400px] mx-auto grid grid-cols-1 xl:grid-cols-5 gap-8">
        
        <div class="xl:col-span-2 space-y-6 no-print p-4">
            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-cyan-500">
                <h1 class="text-xl font-bold mb-5 text-cyan-700">Data Entry</h1>
                <div class="space-y-4">
                    <label class="block text-sm font-bold text-gray-700">Report Date</label>
                    <input type="date" id="reportDate" oninput="updatePreview()" class="w-full border-2 border-gray-200 rounded p-2 outline-none">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-xs font-bold text-gray-500">Total Vehicles</label>
                            <input type="number" id="totalVehicles" value="53" oninput="updatePreview()" class="w-full border-2 border-gray-200 rounded p-2">
                        </div>
                        <div>
                            <label class="text-xs font-bold text-gray-500">Service</label>
                            <input type="number" id="service" value="2" oninput="updatePreview()" class="w-full border-2 border-gray-200 rounded p-2 text-orange-600 font-bold">
                        </div>
                    </div>
                    
                    <p class="text-xs font-bold text-gray-500 uppercase border-b pb-1">Breakdown Types</p>
                    <div class="grid grid-cols-3 gap-2">
                        <div><label class="text-[10px]">Freezer</label><input type="number" id="bdFreezer" value="3" oninput="updatePreview()" class="w-full border rounded p-2"></div>
                        <div><label class="text-[10px]">Electrical</label><input type="number" id="bdElectrical" value="1" oninput="updatePreview()" class="w-full border rounded p-2"></div>
                        <div><label class="text-[10px]">Mechanical</label><input type="number" id="bdMechanical" value="7" oninput="updatePreview()" class="w-full border rounded p-2"></div>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md border-t-4 border-blue-500">
                <h2 class="text-lg font-bold mb-4 text-blue-700">Performance Photo</h2>
                <input type="file" id="imageInput" accept="image/*" class="mb-4 w-full text-sm">
                <div id="cropperWrapperContainer" class="hidden space-y-4">
                    <div class="bg-black rounded overflow-hidden" style="max-height: 350px;">
                        <img id="imageToCrop" src="">
                    </div>
                    <button id="cropButton" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold transition">Confirm Crop</button>
                </div>
            </div>

            <button onclick="handleFinalize()" class="w-full bg-black hover:bg-gray-800 text-white py-5 rounded-xl font-bold shadow-2xl active:scale-95 transition-all text-lg">
                Generate A4 PDF Report
            </button>
        </div>

        <div class="xl:col-span-3">
            <div class="a4-container" id="printableArea">
                <div class="text-center mb-8">
                    <h2 id="prevDate" class="text-3xl font-black border-b-4 border-black pb-2 mb-2"></h2>
                    <p class="italic text-lg font-semibold text-gray-800">Vehicles Performance Report (Freezer Truck)</p>
                </div>

                <table class="excel-table w-full text-base">
                    <tbody>
                        <tr>
                            <td colspan="3" class="text-left font-medium">Total vehicles (Freezer Truck)</td>
                            <td id="prevTotal" class="font-bold text-xl"></td>
                        </tr>
                        <tr>
                            <td colspan="3" class="text-left font-medium">Service</td>
                            <td id="prevService" class="font-bold text-xl text-orange-600"></td>
                        </tr>
                        <tr class="bg-gray-100 font-bold uppercase"><td colspan="4">Breakdown Type</td></tr>
                        <tr class="font-bold bg-gray-50 text-sm">
                            <td style="width: 25%;">Freezer</td>
                            <td style="width: 25%;">Electrical</td>
                            <td style="width: 25%;">Mechanical</td>
                            <td style="width: 25%;" class="bg-blue-50">Total Garage</td>
                        </tr>
                        <tr class="font-bold text-xl">
                            <td id="prevF"></td>
                            <td id="prevE"></td>
                            <td id="prevM"></td>
                            <td id="prevTotalBD" class="bg-blue-50 text-blue-900 text-2xl"></td>
                        </tr>
                        <tr class="running-block text-2xl font-black">
                            <td colspan="3" class="text-right pr-12 py-5">Running Vehicle</td>
                            <td id="prevRunning" class="italic text-3xl"></td>
                        </tr>
                    </tbody>
                </table>

                <div class="viz-container">
                    <img id="finalImagePreview" src="" class="hidden">
                    <div id="placeholderText" class="text-gray-400 text-center p-10 no-print border-2 border-dashed border-gray-300 rounded-lg">
                        <p class="text-sm font-bold">Photo Area</p>
                    </div>
                </div>

                <div class="system-footer">
                    System by <a href="https://shanuka-wickaramanayaka.web.app/index.html" target="_blank" class="font-bold">shanuka wickramanayaka</a> | <b>V 10.1</b>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        document.getElementById('reportDate').valueAsDate = new Date();

        function updatePreview() {
            const date = document.getElementById('reportDate').value;
            const total = parseInt(document.getElementById('totalVehicles').value) || 0;
            const service = parseInt(document.getElementById('service').value) || 0;
            const f = parseInt(document.getElementById('bdFreezer').value) || 0;
            const e = parseInt(document.getElementById('bdElectrical').value) || 0;
            const m = parseInt(document.getElementById('bdMechanical').value) || 0;

            const totalBD = f + e + m + service;
            const running = total - totalBD;

            document.getElementById('prevDate').innerText = date;
            document.getElementById('prevTotal').innerText = total;
            document.getElementById('prevService').innerText = service;
            document.getElementById('prevF').innerText = f;
            document.getElementById('prevE').innerText = e;
            document.getElementById('prevM').innerText = m;
            document.getElementById('prevTotalBD').innerText = totalBD;
            document.getElementById('prevRunning').innerText = running;

            // පී.ඩී.එෆ් නම සඳහා ටයිටල් එක අප්ඩේට් කිරීම
            document.title = "Performance_Report_" + date;
        }

        const imageInput = document.getElementById('imageInput');
        const imageToCrop = document.getElementById('imageToCrop');
        const cropperWrapperContainer = document.getElementById('cropperWrapperContainer');
        const cropButton = document.getElementById('cropButton');
        const finalImagePreview = document.getElementById('finalImagePreview');
        const placeholderText = document.getElementById('placeholderText');
        let cropper;

        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    imageToCrop.src = event.target.result;
                    cropperWrapperContainer.classList.remove('hidden');
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(imageToCrop, { viewMode: 0, autoCropArea: 1 });
                };
                reader.readAsDataURL(file);
            }
        });

        cropButton.addEventListener('click', function() {
            if (!cropper) return;
            const canvas = cropper.getCroppedCanvas({ width: 1500 });
            finalImagePreview.src = canvas.toDataURL('image/jpeg', 0.95);
            finalImagePreview.classList.remove('hidden');
            placeholderText.classList.add('hidden');
        });

        function handleFinalize() {
            window.print();
            setTimeout(() => {
                const to = "samith@pussalla.com";
                const cc = "jayathilake@pussalla.com;sanjeewanee@pussalla.com;gaminda.lod@pussalla.com";
                const subject = encodeURIComponent(`Performance Report - ${document.getElementById('reportDate').value}`);
                window.location.href = `mailto:${to}?cc=${cc}&subject=${subject}`;
            }, 1000);
        }
        updatePreview();
    </script>
</body>
</html>
